    const factoryList = document.getElementById('factoryList');
    const searchInput = document.getElementById('searchInput');
    const filterButtons = document.querySelectorAll('.filter-btn');
    let currentFilter = 'all';
    let currentSearch = '';
    let activeId = null;
    const markers = {};

    function getMarkerConfig(category) {
      const configs = {
        'Машиностроение': { emoji: '🚛', className: 'marker-machinery' },
        'Пищевая': { emoji: '🍞', className: 'marker-food' },
        'Металлургия': { emoji: '⚙️', className: 'marker-metal' },
        'Материалы': { emoji: '🧱', className: 'marker-materials' },
        'Энергетика': { emoji: '⚡', className: 'marker-energy' },
        'Химия': { emoji: '🧪', className: 'marker-chem' },
        'Электротехника': { emoji: '🔌', className: 'marker-electro' },
        'Строительство': { emoji: '🏗️', className: 'marker-build' }
      };
      return configs[category] || { emoji: '🏭', className: 'marker-other' };
    }

    function createFactoryIcon(factory) {
      const cfg = getMarkerConfig(factory.category);
      return L.divIcon({
        className: '',
        html: `<div class="map-marker ${cfg.className}" title="${factory.name}">${cfg.emoji}</div>`,
        iconSize: [34, 34],
        iconAnchor: [17, 17],
        popupAnchor: [0, -12]
      });
    }

    function safeImage(url) {
      return url && typeof url === 'string' && url.trim() ? url : '';
    }

    function createPopup(factory) {
      const imageHtml = safeImage(factory.image) ? `<img src="${safeImage(factory.image)}" alt="${factory.name}" loading="lazy" decoding="async" referrerpolicy="no-referrer" onerror="this.remove();">` : '';
      const moreHtml = factory.more ? `<div class="more-text ${factory.expanded ? '' : 'hidden'}">${factory.more}</div><button class="details-btn" type="button" data-id="${factory.id}" data-kind="popup">${factory.expanded ? 'Свернуть' : 'Подробнее'}</button>` : '';
      return `<div class="popup-card">${imageHtml}<h3>${factory.name}</h3><div class="popup-info"><strong>Отрасль:</strong> ${factory.category}<br><strong>Собственник:</strong> ${factory.owner || 'не указан'}<br><strong>Основан:</strong> ${factory.year}<br><strong>Адрес:</strong> ${factory.address}</div><div class="popup-text">${factory.text}</div>${moreHtml}</div>`;
    }

    function getFilteredFactories() {
      return factories.filter(factory => {
        const matchFilter = currentFilter === 'all' || factory.category === currentFilter;
        const matchSearch = factory.name.toLowerCase().includes(currentSearch.toLowerCase());
        return matchFilter && matchSearch;
      });
    }

    function focusFactory(factory) {
      if (!factory || !markers[factory.id]) return;
      activeId = factory.id;
      map.setView(factory.coords, 13, { animate: false });
      markers[factory.id].openPopup();
      renderFactoryList();
    }

    function attachPopupButton(factory) {
      const marker = markers[factory.id];
      if (!marker) return;
      const popup = marker.getPopup();
      if (!popup) return;
      const popupElement = popup.getElement();
      if (!popupElement) return;
      const button = popupElement.querySelector('[data-kind="popup"]');
      if (!button) return;
      button.onclick = (event) => {
        event.preventDefault();
        event.stopPropagation();
        factory.expanded = !factory.expanded;
        marker.setPopupContent(createPopup(factory));
        marker.openPopup();
        renderFactoryList();
      };
    }

    function renderFactoryList() {
      const filtered = getFilteredFactories();
      if (!filtered.length) {
        factoryList.innerHTML = '<div class="empty-state">Ничего не найдено. Попробуй изменить поиск или выбрать другой фильтр.</div>';
        return;
      }

      factoryList.innerHTML = filtered.map(factory => {
        const imageHtml = safeImage(factory.image) ? `<img src="${safeImage(factory.image)}" alt="${factory.name}" loading="lazy" decoding="async" referrerpolicy="no-referrer" onerror="this.remove();">` : '';
        const moreHtml = factory.more ? `<div class="more-text ${factory.expanded ? '' : 'hidden'}">${factory.more}</div><button class="details-btn" type="button" data-id="${factory.id}" data-kind="card">${factory.expanded ? 'Свернуть' : 'Подробнее'}</button>` : '';
        return `<article class="factory-card ${activeId === factory.id ? 'active' : ''}" data-id="${factory.id}">${imageHtml}<span class="tag">${factory.category}</span><h3>${factory.name}</h3><div class="factory-meta"><span>Основан: ${factory.year}</span><span>${factory.address}</span><span>Собственник: ${factory.owner || 'не указан'}</span></div><p>${factory.text}</p>${moreHtml}</article>`;
      }).join('');

      document.querySelectorAll('.factory-card').forEach(card => {
        card.onclick = (event) => {
          const id = Number(card.dataset.id);
          const factory = factories.find(item => item.id === id);
          const button = event.target.closest('[data-kind="card"]');
          if (button && factory) {
            event.preventDefault();
            event.stopPropagation();
            factory.expanded = !factory.expanded;
            renderFactoryList();
            if (activeId === factory.id && markers[factory.id]) {
              markers[factory.id].setPopupContent(createPopup(factory));
            }
            return;
          }
          focusFactory(factory);
        };
      });
    }

    factories.forEach(factory => {
      const marker = L.marker(factory.coords, { icon: createFactoryIcon(factory) }).addTo(map).bindPopup(createPopup(factory));
      marker.on('click', () => {
        activeId = factory.id;
        renderFactoryList();
      });
      marker.on('popupopen', () => attachPopupButton(factory));
      marker.on('popupclose', () => {
        const popup = marker.getPopup();
        if (popup) popup.setContent(createPopup(factory));
      });
      markers[factory.id] = marker;
    });

    searchInput.addEventListener('input', (e) => {
      currentSearch = e.target.value.trim();
      renderFactoryList();
    });

    filterButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        filterButtons.forEach(item => item.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        renderFactoryList();
      });
    });

    renderFactoryList();
  </script>
</body>
</html>
